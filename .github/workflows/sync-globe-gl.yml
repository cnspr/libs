name: Sync globe.gl

on:
  push:
    paths:
      - '.github/workflows/sync-globe-gl.yml'
  schedule:
    - cron: '0 3 * * 1'   # weekly, Monday 03:00 UTC
  workflow_dispatch:

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out libs repo
        uses: actions/checkout@v6

      - name: Clone globe.gl source
        run: git clone --depth 1 https://github.com/vasturiano/globe.gl src/globe.gl

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          cache-dependency-path: src/globe.gl/package-lock.json

      - name: Install and build
        working-directory: src/globe.gl
        run: npm ci && npm run build

      - name: Copy artifact
        run: |
          mkdir -p globe.gl
          cp src/globe.gl/dist/globe.gl.min.js globe.gl/globe.gl.min.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/globe.gl globe.gl/globe.gl.min.js
          git diff --cached --quiet && echo "No changes" && exit 0
          UPSTREAM_SHA=$(git -C src/globe.gl rev-parse HEAD)
          git commit -m "chore: sync globe.gl ${UPSTREAM_SHA:0:7}"
          git push
