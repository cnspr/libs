name: Sync globe.gl

on:
  push:
    paths:
      - '.github/workflows/sync-globe-gl.yml'
  schedule:
    - cron: '0 3 * * 1'   # weekly, Monday 03:00 UTC
  workflow_dispatch:

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out libs repo
        uses: actions/checkout@v6

      - name: Clone globe.gl source
        run: git clone https://github.com/vasturiano/globe.gl src/globe.gl

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          cache-dependency-path: globe.gl/package-lock.json

      - name: Install and build
        working-directory: src/globe.gl
        run: npm install && npm run build

      - name: Copy artifact and archive source
        run: |
          cp src/globe.gl/package-lock.json globe.gl/package-lock.json
          cp src/globe.gl/dist/globe.gl.min.js globe.gl/globe.gl.min.js
          cd src && zip -r ../globe.gl/globe.gl.src.zip globe.gl

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add globe.gl/globe.gl.min.js globe.gl/globe.gl.src.zip globe.gl/package-lock.json
          git diff --cached --quiet && exit 0
          UPSTREAM_SHA=$(git -C src/globe.gl rev-parse HEAD)
          git commit -m "chore: update artifacts ${UPSTREAM_SHA:0:7}"
          git push
